<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chaitanya Organic</title>

<style>
body {
  font-family: 'Segoe UI';
  margin:0;
  background:#f0fff0;
}

header {
  background:linear-gradient(to right, green, darkgreen);
  color:white;
  text-align:center;
  padding:20px;
}

.hero {
  background:url('https://images.unsplash.com/photo-1550258987-190a2d41a8ba') no-repeat center/cover;
  height:300px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:28px;
  font-weight:bold;
}

.section {
  padding:20px;
}

.cards {
  display:flex;
  flex-wrap:wrap;
  gap:15px;
}

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  width:220px;
  box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.card img {
  width:100%;
  border-radius:10px;
}

button {
  background:orange;
  border:none;
  padding:10px;
  width:100%;
  margin-top:10px;
  cursor:pointer;
}

.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:green;
  color:white;
  padding:15px;
  border-radius:50%;
  font-size:20px;
}

form input, form select {
  width:100%;
  padding:10px;
  margin:5px 0;
}

</style>
</head>

<body>

<header>
<h1>🌿 Chaitanya Organic</h1>
<p>Fresh Organic Mangoes Direct from Farm</p>
</header>

<div class="hero">
Order Fresh Mangoes Today 🥭
</div>

<div class="section">
<h2>🥭 Our Mango Varieties</h2>
<div class="cards">

<div class="card">
<img src="https://source.unsplash.com/300x200/?kesar-mango">
<h3>Kesar</h3>
<p>Sweet & aromatic</p>
<a href="https://wa.me/918660849779?text=I want Kesar Mango">
<button>Order</button></a>
</div>

<div class="card">
<img src="https://source.unsplash.com/300x200/?alphonso-mango">
<h3>Apus (Alphonso)</h3>
<p>Premium rich taste</p>
<a href="https://wa.me/918660849779?text=I want Alphonso Mango">
<button>Order</button></a>
</div>

<div class="card">
<img src="https://source.unsplash.com/300x200/?mango">
<h3>Dashera</h3>
<p>Juicy & delicious</p>
<a href="https://wa.me/918660849779?text=I want Dashera Mango">
<button>Order</button></a>
</div>

<div class="card">
<img src="https://source.unsplash.com/300x200/?organic-mango">
<h3>Mallika</h3>
<p>Unique flavor</p>
<a href="https://wa.me/918660849779?text=I want Mallika Mango">
<button>Order</button></a>
</div>

</div>
</div>

<div class="section">
<h2>📲 Quick Order Form</h2>
<form>
<input type="text" placeholder="Your Name">
<input type="tel" placeholder="Phone Number">
<select>
<option>Select Mango</option>
<option>Kesar</option>
<option>Apus</option>
<option>Dashera</option>
<option>Mallika</option>
</select>
<input type="number" placeholder="Quantity (kg)">
<button type="submit">Submit</button>
</form>
</div>

<div class="section">
<h2>📍 Location</h2>
<iframe 
src="https://maps.google.com/maps?q=Hagargi&t=&z=13&ie=UTF8&iwloc=&output=embed"
width="100%" height="250">
</iframe>
</div>

<a class="whatsapp" href="https://wa.me/918660849779">💬</a>

</body>
</html>
